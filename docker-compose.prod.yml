services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dvizh
      POSTGRES_PASSWORD: dvizh
      POSTGRES_DB: dvizh
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvizh"]
      interval: 5s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: .env.prod
    volumes:
      - ./apps/cms/media:/app/apps/cms/media
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cms

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    env_file: .env.prod
    depends_on:
      - nginx
    profiles:
      - tunnel

volumes:
  postgres-data:
