worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 256;

    upstream cms {
        server cms:3002;
    }

    # ──────────────────────────────────────
    # dvizh.cc / www.dvizh.cc — static site
    # ──────────────────────────────────────
    server {
        listen 80;
        server_name dvizh.cc www.dvizh.cc;

        # Block search engine indexing (test domain)
        add_header X-Robots-Tag "noindex, nofollow" always;

        # CMS API (forms + media) — must be before static assets regex
        location /api/ {
            proxy_pass http://cms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CMS media (direct /media path)
        location /media/ {
            proxy_pass http://cms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets caching (only for files in dist, not /api)
        location ~* ^(?!/api/)(?!/media/).+\.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Block /admin on public domain
        location /admin {
            return 404;
        }

        # Static site
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /404.html;
        }
    }

    # ──────────────────────────────────────
    # admin.dvizh.cc — CMS admin panel
    # ──────────────────────────────────────
    server {
        listen 80;
        server_name admin.dvizh.cc;

        # Block search engine indexing
        add_header X-Robots-Tag "noindex, nofollow" always;

        # Redirect root to /admin
        location = / {
            return 302 /admin;
        }

        location / {
            proxy_pass http://cms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ──────────────────────────────────────
    # preview.dvizh.cc — dev server
    # ──────────────────────────────────────
    server {
        listen 80;
        server_name preview.dvizh.cc;

        # Block search engine indexing
        add_header X-Robots-Tag "noindex, nofollow" always;

        location / {
            proxy_pass http://host.docker.internal:4321;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ──────────────────────────────────────
    # fallback — catch unknown hosts
    # ──────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
