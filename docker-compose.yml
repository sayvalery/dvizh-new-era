services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dvizh
      POSTGRES_PASSWORD: dvizh
      POSTGRES_DB: dvizh
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvizh"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
